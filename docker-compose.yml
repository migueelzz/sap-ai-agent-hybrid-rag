services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atem_secret}
      POSTGRES_DB: ${POSTGRES_DB:-atem_rag}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atem"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: